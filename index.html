<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="workspace" aria-label="Todo管理">
            <aside class="task-editor" aria-label="タスク入力">
                <div class="brand-row">
                    <div>
                        <p class="eyebrow">Task board</p>
                        <h1>Todo App</h1>
                    </div>
                    <div class="progress-ring" aria-label="完了率">
                        <span id="progressValue">0%</span>
                    </div>
                </div>

                <div class="stats-grid" aria-label="集計">
                    <div>
                        <span id="totalCount">0</span>
                        <small>合計</small>
                    </div>
                    <div>
                        <span id="activeCount">0</span>
                        <small>未完了</small>
                    </div>
                    <div>
                        <span id="doneCount">0</span>
                        <small>完了</small>
                    </div>
                </div>

                <form id="taskForm" class="form-grid">
                    <input type="hidden" id="taskId">

                    <label for="taskTitle">タイトル</label>
                    <input id="taskTitle" name="title" type="text" maxlength="80" placeholder="例: 見積書を確認" autocomplete="off" required>

                    <label for="taskNote">メモ</label>
                    <textarea id="taskNote" name="note" rows="4" maxlength="240" placeholder="必要な補足"></textarea>

                    <div class="split-fields">
                        <div>
                            <label for="taskDue">期限</label>
                            <input id="taskDue" name="dueDate" type="date">
                        </div>
                        <div>
                            <label for="taskPriority">優先度</label>
                            <select id="taskPriority" name="priority">
                                <option value="normal">通常</option>
                                <option value="high">高</option>
                                <option value="low">低</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button class="primary-button" type="submit" id="submitButton">
                            <span aria-hidden="true">+</span>
                            <span>追加</span>
                        </button>
                        <button class="ghost-button hidden" type="button" id="cancelEditButton">キャンセル</button>
                    </div>
                </form>
            </aside>

            <section class="task-list-panel" aria-label="タスク一覧">
                <div class="toolbar">
                    <div class="search-box">
                        <svg aria-hidden="true" viewBox="0 0 24 24">
                            <path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z"/>
                            <path d="m16 16 4.2 4.2-1.4 1.4-4.2-4.2Z"/>
                        </svg>
                        <input id="searchInput" type="search" placeholder="検索" aria-label="検索">
                    </div>

                    <select id="sortSelect" class="sort-select" aria-label="並び替え">
                        <option value="createdDesc">新しい順</option>
                        <option value="dueAsc">期限が近い順</option>
                        <option value="priorityDesc">優先度順</option>
                    </select>
                </div>

                <div class="filter-tabs" role="tablist" aria-label="表示切替">
                    <button type="button" class="filter-tab active" data-filter="all">すべて</button>
                    <button type="button" class="filter-tab" data-filter="active">未完了</button>
                    <button type="button" class="filter-tab" data-filter="today">今日</button>
                    <button type="button" class="filter-tab" data-filter="overdue">期限切れ</button>
                    <button type="button" class="filter-tab" data-filter="done">完了</button>
                </div>

                <div id="taskList" class="task-list" aria-live="polite"></div>

                <div id="emptyState" class="empty-state hidden">
                    <div class="empty-visual" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <p>タスクはありません</p>
                </div>

                <div class="footer-actions">
                    <button class="text-button" type="button" id="clearDoneButton">完了済みを削除</button>
                    <button class="text-button danger" type="button" id="resetButton">全削除</button>
                </div>
            </section>
        </section>
    </main>

    <template id="taskTemplate">
        <article class="task-item">
            <button class="check-button" type="button" aria-label="完了切替">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M20.3 6.7 9.5 17.5l-5.8-5.8 1.4-1.4 4.4 4.4 9.4-9.4Z"/>
                </svg>
            </button>
            <div class="task-content">
                <div class="task-heading">
                    <h2></h2>
                    <span class="priority-badge"></span>
                </div>
                <p class="task-note"></p>
                <div class="task-meta">
                    <span class="due-date"></span>
                    <span class="created-date"></span>
                </div>
            </div>
            <div class="task-actions">
                <button class="icon-button edit-button" type="button" aria-label="編集" title="編集">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                        <path d="M4 17.3V20h2.7L17.9 8.8l-2.7-2.7L4 17.3Zm15.8-10.4a1 1 0 0 0 0-1.4l-1.3-1.3a1 1 0 0 0-1.4 0l-1 1 2.7 2.7 1-1Z"/>
                    </svg>
                </button>
                <button class="icon-button delete-button" type="button" aria-label="削除" title="削除">
                    <svg aria-hidden="true" viewBox="0 0 24 24">
                        <path d="M8 5V3h8v2h5v2H3V5h5Zm-2 4h12l-.8 12H6.8L6 9Zm4 2v8h2v-8h-2Zm4 0v8h2v-8h-2Z"/>
                    </svg>
                </button>
            </div>
        </article>
    </template>

    <script src="app.js"></script>
</body>
</html>
